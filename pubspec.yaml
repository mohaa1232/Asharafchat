name: asharaf_chat
description: AsharafChat — a premium, secure messaging app for Jiyaad Travel Agency and friends.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.1
  firebase_remote_config: ^5.0.1
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.1
  firebase_app_check: ^0.3.0

  # Auth extras
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  pinput: ^5.0.0 # OTP input UI

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  video_player: ^2.9.1
  ffmpeg_kit_flutter: ^6.0.3
  cached_network_image: ^3.3.1
  file_picker: ^8.0.5
  record: ^5.1.2 # voice notes
  just_audio: ^0.9.40

  # Maps & location
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Security
  encrypt: ^5.0.3
  local_auth: ^2.3.0 # biometric app/chat lock

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  emoji_picker_flutter: ^2.2.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  contacts_service: ^0.6.3
  share_plus: ^9.0.0

  # Calling (scaffolding — requires your own Agora App ID)
  agora_rtc_engine: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/stickers/
